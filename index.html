<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD DE TAREAS</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="JS/main.js"></script>
</head>
<body>
    
    <header class="header">
        <div class="container">
            <input type="text" id="inputText" placeholder="Escriba la tarea para agregar">
            <select name="selectDificultad" id="selectDificultad">
                <option value="facil">facil</option>
                <option value="media">media</option>
                <option value="dificil">dificil</option>
            </select>
            <button id="btn-agregar" data-action="agregar">Agregar</button>
        </div>
    </header>

    <section class="filtro" id="sectionFiltro">
        <button data-action="filtro" data-filtro="all">All</button>
        <button data-action="filtro" data-filtro="completed">Completado</button>
        <button data-action="filtro" data-filtro="pending">Pendientes</button>
    </section>

    <section id="contador">
        
    </section>
    
    <section id="mensajeContador">
        <p id="mensaje">
    
        </p>
    </section>
    <main class="main">
        <div class="container">
            <ul class="lista" id="listaTarea">

            </ul>
        </div>
    </main>
</body>
</html>
